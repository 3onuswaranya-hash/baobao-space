<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เบา เบา - พื้นที่พักใจ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDF8F5] text-[#5D4A44] font-sans h-screen flex flex-col items-center justify-center p-6 text-center">
    
    <div class="max-w-md">
        <h1 class="text-4xl font-bold mb-4">เบา เบา</h1>
        <p class="text-[#87736A] mb-8 text-lg">พื้นที่เล็กๆ ที่พร้อมรับฟังเสมอ</p>
        
        <form action="https://formspree.io/f/xlgplonr" method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="ชื่อของคุณ" required class="w-full p-3 rounded-lg border border-[#DDAF94]">
            <input type="email" name="email" placeholder="อีเมลของคุณ" required class="w-full p-3 rounded-lg border border-[#DDAF94]">
            <textarea name="message" placeholder="เล่าความรู้สึกของคุณที่นี่..." required class="w-full p-3 rounded-lg border border-[#DDAF94]"></textarea>
            <button type="submit" class="bg-[#DDAF94] text-white px-8 py-3 rounded-full font-medium w-full hover:bg-[#C89B80]">
                ส่งข้อความ
            </button>
        </form>
    </div>

</body>
</html>
